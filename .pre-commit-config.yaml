ci:
    skip: [mypy]
repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
    -   id: trailing-whitespace
    -   id: end-of-file-fixer
    -   id: check-docstring-first
        exclude: 'bqskit/ext/rigetti.py'
    -   id: debug-statements
    -   id: double-quote-string-fixer
    -   id: name-tests-test
        args: [--django]
    -   id: check-case-conflict
    -   id: check-merge-conflict
    -   id: mixed-line-ending
    -   id: check-added-large-files
        args: ['--maxkb=8192']
    -   id: fix-byte-order-marker
# -   repo: https://github.com/PyCQA/docformatter
#     rev: v1.7.8
#     hooks:
#     -   id: docformatter
#         args:
#             - --in-place
#             - --pre-summary-newline
#             - --wrap-summaries=80
#             - --wrap-descriptions=80
# # See: https://github.com/PyCQA/docformatter/issues/346
-   repo: https://github.com/hhatto/autopep8
    rev: v2.3.2
    hooks:
    -   id: autopep8
        args:
            - --in-place
            - --max-line-length=80
            - --ignore=E731
        exclude: 'tests/ext.*'
-   repo: https://github.com/asottile/pyupgrade
    rev: v3.21.2
    hooks:
    -   id: pyupgrade
        args:
            - --py39-plus
-   repo: https://github.com/asottile/reorder_python_imports
    rev: v3.16.0
    hooks:
    -   id: reorder-python-imports
        args:
            - --add-import
            - from __future__ import annotations
            - --py39-plus
        exclude: 'tests/ext.*'
-   repo: https://github.com/asottile/add-trailing-comma
    rev: v4.0.0
    hooks:
    -   id: add-trailing-comma
- repo: https://github.com/PyCQA/autoflake
  rev: v2.3.3
  hooks:
    - id: autoflake
      args:
        - --in-place
-   repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.0.0
    hooks:
    - id: mypy
      exclude: tests/qis/test_pauli.py
      additional_dependencies: ["numpy>=1.21"]
-   repo: https://github.com/PyCQA/flake8
    rev: 7.3.0
    hooks:
    -   id: flake8
        args:
            - --ignore=E741,W503,F901,E731,TYP006,TYP001,TYP002
            - --max-line-length=80
            - --per-file-ignores=bqskit/runtime/worker.py:E402
        additional_dependencies: [flake8-typing-imports==1.13.0]
